<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MARENE — Accesorios minimalistas para mujer. Compra collares, aretes, pulseras y sets con una experiencia simple y directa.">
    <title>MARENE — Catálogo Minimal</title>
    <link rel="icon" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root { color-scheme: light; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; color: #111; }
        * { box-sizing: border-box; }
        a { color: inherit; text-decoration: none; }
        .page-shell { min-height: 100vh; display: flex; flex-direction: column; }
        .page-header { position: sticky; top: 0; z-index: 20; background: #fff; border-bottom: 1px solid rgba(17,17,17,.08); padding: 1rem 1rem .75rem; display: flex; flex-direction: column; align-items: center; }
        .brand-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 700; letter-spacing: .35em; text-transform: uppercase; margin: 0; }
        .top-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: .5rem; margin: .9rem 0 1rem; width: 100%; max-width: 720px; }
        .top-action { display: inline-flex; align-items: center; gap: .5rem; padding: .65rem .95rem; border-radius: 999px; background: #f7f7f7; color: #111; font-size: .88rem; border: 1px solid rgba(17,17,17,.09); transition: background .2s ease; }
        .top-action:hover { background: #efefef; }
        .top-action svg { width: 1rem; height: 1rem; }
        .category-bar { display: flex; gap: .75rem; overflow-x: auto; padding-bottom: .85rem; width: 100%; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .category-bar::-webkit-scrollbar { display: none; }
        .category-chip { flex: 0 0 auto; padding: .75rem 1rem; border-radius: 999px; border: 1px solid rgba(17,17,17,.09); background: #fafafa; color: #111; font-size: .82rem; text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; transition: transform .18s ease, background .18s ease; }
        .category-chip.active { background: #111; color: #fff; border-color: #111; transform: translateY(-1px); }
        main { flex: 1; width: min(1200px,100%); margin: 0 auto; padding: 1.5rem 1rem 3rem; }
        .hero-section { text-align: center; max-width: 720px; margin: 0 auto 2rem; }
        .hero-title { font-size: clamp(2rem,4vw,3.2rem); line-height: 1.05; margin: 0 0 1rem; letter-spacing: .08em; }
        .hero-copy { margin: 0 auto 1.5rem; color: #555; font-size: 1rem; line-height: 1.75; max-width: 34rem; }
        .product-summary { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .product-summary span { color: #666; font-size: .95rem; }
        .product-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: .95rem; }
        @media (min-width: 900px) { .product-grid { grid-template-columns: repeat(4,minmax(0,1fr)); gap: 1rem; } }
        .product-card { position: relative; display: block; border-radius: 1rem; overflow: hidden; background: #fff; box-shadow: 0 16px 34px rgba(0,0,0,.06); transition: transform .25s ease, box-shadow .25s ease; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 22px 46px rgba(0,0,0,.09); }
        .product-image { position: relative; width: 100%; aspect-ratio: 1 / 1.15; background: #f6f4ef; }
        .product-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .product-action { position: absolute; right: .85rem; bottom: .85rem; width: 2.6rem; height: 2.6rem; border-radius: 50%; border: 1px solid rgba(255,255,255,.9); background: rgba(17,17,17,.88); display: inline-flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 14px 28px rgba(0,0,0,.16); }
        .product-action svg { width: 1rem; height: 1rem; }
        .product-info { padding: 1rem; }
        .product-name { margin: 0 0 .45rem; font-size: .92rem; line-height: 1.3; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
        .product-price { margin: 0; font-size: 1rem; font-weight: 700; }
        .minimal-footer { border-top: 1px solid rgba(17,17,17,.08); padding: 1.5rem 1rem 2rem; text-align: center; color: #666; font-size: .92rem; }
        .footer-socials { display: inline-flex; gap: .65rem; margin-bottom: .75rem; }
        .footer-socials a { width: 2.5rem; height: 2.5rem; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; background: #f4f4f4; color: #111; }
        .footer-note { margin: 0; color: #777; font-size: .9rem; }
        .whatsapp-fixed { position: fixed; right: 1rem; bottom: 1rem; z-index: 100; width: 3.8rem; height: 3.8rem; border-radius: 50%; background: #25d366; display: inline-flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 18px 40px rgba(37,213,102,.24); transition: transform .2s ease; }
        .whatsapp-fixed:hover { transform: translateY(-2px); }
        @media (max-width: 600px) { .page-header { padding: 1rem .85rem .6rem; } .top-actions { margin: .75rem 0 .9rem; } .hero-title { font-size: 2rem; } .product-grid { gap: .75rem; } }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <a href="./index.html" class="brand-logo">MARENE</a>
            <div class="top-actions">
                <a href="./contacto.html" class="top-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M7 10l5 5 5-5"/></svg>Contacto</a>
                <a href="./contacto.html" class="top-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M12 3v18"/></svg>Entrega</a>
            </div>
            <nav class="category-bar" aria-label="Categorías" id="category-nav"></nav>
        </header>
        <main>
            <section class="hero-section" aria-labelledby="hero-title">
                <h1 id="hero-title" class="hero-title">Joyas minimalistas para tu día a día.</h1>
                <p class="hero-copy">Colección de accesorios MARENE pensada para ser usada sin esfuerzo: simple, elegante y directa.</p>
                <a href="./catalogo.html" class="btn btn-primary">Explorar colección</a>
            </section>
            <section class="catalog-section">
                <div class="product-summary"><span id="product-count">Cargando productos...</span></div>
                <div class="product-grid" id="product-grid"></div>
            </section>
        </main>
        <footer class="minimal-footer">
            <div class="footer-socials">
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><path d="M17.5 6.5h.01"/></svg></a>
            </div>
            <p class="footer-note">Soporte directo por WhatsApp y atención personalizada.</p>
        </footer>
    </div>
    <a href="https://wa.me/573001234567?text=Hola%20MARENE%2C%20quiero%20más%20información%20de%20sus%20accesorios" class="whatsapp-fixed" target="_blank" rel="noopener noreferrer" aria-label="Abrir WhatsApp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2h-1l-1 1-2-2h-4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v4z"/><path d="M17 10l-3 3-3-3"/></svg></a>
    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/favorites.js"></script>
    <script>
        const categoryNav = document.getElementById('category-nav');
        const productGrid = document.getElementById('product-grid');
        const productCount = document.getElementById('product-count');

        const categories = [{ id: 'all', label: 'Todo' }].concat((window.CATEGORIES || []).filter(cat => cat.enabled));

        function formatCOP(value) {
            return '$' + Number(value).toLocaleString('es-CO') + ' COP';
        }

        function renderCategoryBar(activeId = 'all') {
            categoryNav.innerHTML = categories.map(cat => `
                <button type="button" class="category-chip${cat.id === activeId ? ' active' : ''}" data-category="${cat.id}">
                    ${cat.label}
                </button>
            `).join('');
            categoryNav.querySelectorAll('.category-chip').forEach(button => {
                button.addEventListener('click', () => {
                    const category = button.dataset.category;
                    renderProducts(category);
                    renderCategoryBar(category);
                });
            });
        }

        function renderProducts(category = 'all') {
            const list = (window.PRODUCTS || []).filter(product => category === 'all' || product.category === category);
            productCount.textContent = `${list.length} productos disponibles`;
            productGrid.innerHTML = list.map(product => `
                <a class="product-card" href="./producto.html?id=${product.id}">
                    <div class="product-image">
                        <img src="${product.mainImage}" alt="${product.name}">
                        <span class="product-action" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
                    </div>
                    <div class="product-info">
                        <p class="product-name">${product.name}</p>
                        <p class="product-price">${formatCOP(product.price)}</p>
                    </div>
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCategoryBar();
            renderProducts();
        });
    </script>
</body>
</html>

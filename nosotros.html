<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MARENE — Accesorios minimalistas para mujer. Compra collares, aretes, pulseras y más con envío rápido desde Colombia.">
    <title>MARENE — Catálogo Minimal</title>

    <link rel="icon" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        :root {
            color-scheme: light;
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #111;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .page-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .page-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #fff;
            border-bottom: 1px solid rgba(17, 17, 17, 0.06);
            padding: 1rem 1rem 0.65rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin: 0;
        }
        .top-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem 0 0.85rem;
            width: 100%;
            max-width: 720px;
        }
        .top-action {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.85rem;
            border-radius: 999px;
            background: #f7f7f7;
            color: #111;
            font-size: 0.88rem;
            border: 1px solid rgba(17, 17, 17, 0.08);
            transition: background 0.2s ease;
        }
        .top-action:hover {
            background: #efefef;
        }
        .top-action svg {
            width: 1rem;
            height: 1rem;
        }
        .category-bar {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.85rem;
            width: 100%;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar {
            display: none;
        }
        .category-chip {
            flex: 0 0 auto;
            padding: 0.75rem 1rem;
            border-radius: 999px;
            border: 1px solid rgba(17, 17, 17, 0.09);
            background: #fafafa;
            color: #111;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: transform 0.18s ease, background 0.18s ease;
            white-space: nowrap;
        }
        .category-chip.active {
            background: #111;
            color: #fff;
            border-color: #111;
            transform: translateY(-1px);
        }
        main {
            flex: 1;
            width: min(1200px, 100%);
            margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
        }
        .hero-copy {
            max-width: 640px;
            margin: 0 auto 1.5rem;
            text-align: center;
            color: #444;
            font-size: 1rem;
            line-height: 1.7;
        }
        .product-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .product-summary span {
            color: #666;
            font-size: 0.92rem;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.9rem;
        }
        @media (min-width: 900px) {
            .product-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 1rem;
            }
        }
        .product-card {
            position: relative;
            display: block;
            border-radius: 1rem;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 16px 40px rgba(0,0,0,0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 46px rgba(0,0,0,0.09);
        }
        .product-image {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.15;
            background: #f7f5f2;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .product-action {
            position: absolute;
            right: 0.8rem;
            bottom: 0.8rem;
            width: 2.6rem;
            height: 2.6rem;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.8);
            background: rgba(17,17,17,0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 14px 28px rgba(0,0,0,0.16);
        }
        .product-action svg {
            width: 1rem;
            height: 1rem;
        }
        .product-info {
            padding: 1rem;
        }
        .product-name {
            margin: 0 0 0.45rem;
            font-size: 0.92rem;
            line-height: 1.3;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #111;
        }
        .product-price {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            color: #111;
        }
        .whatsapp-fixed {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            z-index: 100;
            width: 3.8rem;
            height: 3.8rem;
            border-radius: 50%;
            background: #25d366;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 18px 40px rgba(37,213,102,0.24);
            transition: transform 0.2s ease;
        }
        .whatsapp-fixed:hover {
            transform: translateY(-2px);
        }
        .whatsapp-fixed svg {
            width: 1.4rem;
            height: 1.4rem;
        }
        .minimal-footer {
            border-top: 1px solid rgba(17,17,17,0.08);
            padding: 1.5rem 1rem 2rem;
            text-align: center;
            color: #666;
            font-size: 0.92rem;
        }
        .footer-socials {
            display: inline-flex;
            gap: 0.65rem;
            margin-bottom: 0.9rem;
        }
        .footer-socials a {
            width: 2.5rem;
            height: 2.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f4f4f4;
            color: #111;
        }
        .footer-note {
            margin: 0;
            color: #777;
            font-size: 0.9rem;
        }
        .screen-reader-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <a href="./index.html" class="brand-logo">MARENE</a>
            <div class="top-actions">
                <a href="./contacto.html" class="top-action" aria-label="Contacto">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2"/><path d="M7 10l5 5 5-5"/></svg>
                    Contacto
                </a>
                <a href="./contacto.html" class="top-action" aria-label="Entrega">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h18"/><path d="M12 3v18"/></svg>
                    Entrega
                </a>
            </div>
            <nav class="category-bar" aria-label="Categorías de productos" id="category-nav"></nav>
        </header>

        <main>
            <p class="hero-copy">Colección de accesorios MARENE con un enfoque directo y funcional: compra fácil, rápido y con estética limpia para todos los días.</p>
            <div class="product-summary">
                <span id="product-count">Cargando productos...</span>
            </div>

            <section class="product-grid" id="product-grid" aria-live="polite"></section>
        </main>

        <footer class="minimal-footer">
            <div class="footer-socials">
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37a4 4 0 1 1-4.03-4"/><path d="M17.5 6.5h.01"/></svg>
                </a>
            </div>
            <p class="footer-note">Soporte rápido en WhatsApp y atención personalizada.</p>
        </footer>
    </div>

    <a href="https://wa.me/573001234567?text=Hola%20MARENE%2C%20quiero%20más%20información%20de%20sus%20accesorios" class="whatsapp-fixed" target="_blank" rel="noopener noreferrer" aria-label="Abrir WhatsApp">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2h-1l-1 1-2-2h-4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v4z"/><path d="M17 10l-3 3-3-3"/></svg>
    </a>

    <script src="js/data.js"></script>
    <script>
        const categoryNav = document.getElementById('category-nav');
        const productGrid = document.getElementById('product-grid');
        const productCount = document.getElementById('product-count');

        const categories = [{ id: 'all', label: 'Todo' }].concat(
            (window.CATEGORIES || [])
                .filter(cat => cat.enabled)
                .map(cat => ({ id: cat.id, label: cat.label }))
        );

        function formatCOP(value) {
            return '$' + Number(value).toLocaleString('es-CO') + ' COP';
        }

        function renderCategoryBar(activeId = 'all') {
            categoryNav.innerHTML = categories.map(cat => `
                <button type="button" class="category-chip${cat.id === activeId ? ' active' : ''}" data-category="${cat.id}">
                    ${cat.label}
                </button>
            `).join('');

            categoryNav.querySelectorAll('.category-chip').forEach(button => {
                button.addEventListener('click', () => {
                    const category = button.dataset.category;
                    renderProducts(category);
                    renderCategoryBar(category);
                });
            });
        }

        function renderProducts(category = 'all') {
            const products = (window.PRODUCTS || []).filter(product => {
                return category === 'all' || product.category === category;
            });

            productCount.textContent = `${products.length} productos disponibles`;

            productGrid.innerHTML = products.map(product => `
                <a class="product-card" href="./producto.html?id=${product.id}">
                    <div class="product-image">
                        <img src="${product.mainImage}" alt="${product.name}">
                        <span class="product-action" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        </span>
                    </div>
                    <div class="product-info">
                        <p class="product-name">${product.name}</p>
                        <p class="product-price">${formatCOP(product.price)}</p>
                    </div>
                </a>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCategoryBar();
            renderProducts();
        });
    </script>
</body>
</html>
